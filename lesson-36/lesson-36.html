<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>ДЗ-36</title>
  
  <script type="module" crossorigin src="/js-homework-vite/assets/lesson-36-b2c61651.js"></script>
  <link rel="modulepreload" crossorigin href="/js-homework-vite/assets/modulepreload-polyfill-3cfb730f.js">
  <link rel="stylesheet" href="/js-homework-vite/assets/lesson-36-849a9372.css">
</head>
<body>

  <div class="pagination-box">
    <button class="open-modal-btn">Створити пост</button>
  <label>
    Кількість постів:
    <input type="number" class="limit-input" min="1" max="10" value="4" />
  </label>

  <label>
    Номер сторінки:
    <input type="number" class="page-input" min="1" value="1" />
  </label>

  <button class="fetch-btn">Fetch Posts</button>
</div>
<div class="info-box">
  <p>Кількість елементів у колекції: <span class="total-posts">0</span></p>
  <p>Сторінка № <span class="current-page">1</span> з <span class="total-pages">0</span></p>
</div>
<ul class="posts-list"></ul>
  
    <!-- <script type="module" src="./js/homework-34 copy 2.js"></script> -->
    <!-- <script type="module" src="./js/homework-27-teacher.js"></script> -->
     <div class="backdrop is-hidden">
  <div class="modal">
    <button type="button" class="close-modal-btn">✖</button>

    <form class="create-post-form">
      <input
        type="number"
        class="user-id-input"
        placeholder="Ідентифікатор автора"
        min="1"
      />

      <input
        type="text"
        class="title-input"
        placeholder="Заголовок"
      />

      <textarea
        class="body-input"
        placeholder="Текст поста"
      ></textarea>

      <button type="submit">Save</button>
    </form>
  </div>
</div>
</body>
</html>
